version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: OVO-db
    restart: always
    environment:
      POSTGRES_DB: OVO
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d OVO"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: OVO-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=OVO.AI
      - API_V1_STR=/api/v1
      - SUPABASE_URL=http://db:5432
      - SUPABASE_SERVICE_ROLE_KEY=secretpassword
      - GOOGLE_CLIENT_ID=mock-client-id
      - GOOGLE_CLIENT_SECRET=mock-client-secret
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/v1/auth/callback
      - GEMINI_API_KEY=mock-gemini-key
      - NVIDIA_NIM_API_KEY=mock-nim-key
      - SANDBOX_MODE=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: OVO-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
